<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>Blog preview card</title>
  </head>
  <body>
    <div class="card">
      <section class="card__header">
        <img
          src="./assets/images/illustration-article.svg"
          alt="card-header"
          class="card__header-image"
        />
      </section>
      <section class="card__body">
        <div class="card__body-badge">
          <span class="card__body-span">Learning</span>
        </div>
        <p>Published 21 Dec 2023</p>

        <div class="card__body-title">
          <h1>HTML & CSS foundations</h1>
        </div>
        <p class="card__body-description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>

        <section class="card__footer">
          <img
            src="./assets/images/image-avatar.webp"
            class="card__footer-image"
          />Greg Hooper
        </section>
      </section>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Diego Quevedo</a>
    </div>
  </body>
</html>
